<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notatki</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css" />
</head>

<body>
    <div class="app-wrapper">

        <header class="app-header">
            <div class="header-dot"></div>
            <div>
                <h1>Notatki</h1>
            </div>
            <button onclick="showAi()" class="add-note btn-ai">AI</button>
            <button onclick="showNoteAdd()" class="add-note"><i class="fa-solid fa-plus" style="color: rgb(255, 255, 255);"></i></button>            
        </header>
        
        <div class="card">
            <div class="field-group">
                <label for="fileName">Tytuł notatki</label>
                <input type="text" id="fileName" placeholder="np. Plan na jutro">
            </div>

            <div class="field-group">
                <label for="content">Treść</label>
                <textarea id="content" placeholder="Wpisz treść notatki…" rows="4"></textarea>
            </div>

            <div class="category-row">
                <div class="field-group">
                    <label for="category">Kategoria</label>
                    <select id="category">
                        <option>Sport</option>
                        <option>Zdrowie</option>
                        <option>Dom</option>
                        <option>Praca</option>
                        <option>Hobby</option>
                        <option>Inne</option>
                    </select>
                </div>
                <button class="btn-add-category" onclick="addCategory()">
                    <span style="font-size:16px;line-height:1">+</span> Nowa kategoria
                </button>
            </div>

            <div class="actions-row">
                <button class="btn btn-primary" onclick="addNote()">Dodaj notatkę</button>
                <button class="btn btn-ghost" onclick="cancel()">Anuluj</button>
            </div>
        </div>

        <div class="card-ai">
            <div class="description">
                <p>Notatki AI pozwalają na tworzenie treści na dowolny temat. Wystarczy, że wpiszesz, o czym ma być dana notatka.</p>
            </div>

            <div class="field-group">
                <label for="aiFileName">Tytuł notatki</label>
                <input type="text" id="aiFileName" placeholder="np. Plan na jutro">
            </div>
            
            <div class="field-group">
                <label for="NoteDescription">Krótki opis notatki</label>
                <input type="text" id="NoteDescription" placeholder="np. Opis zdrowej żywności">
            </div>
            
            <div class="field-group">
                <label for="aiContent">Treść</label>
                <textarea id="aiContent" placeholder="Tu AI wygeneruje treść" rows="4" disabled></textarea>
            </div>
            
            <div class="category-row">
                <div class="field-group">
                    <label for="aiCategory">Kategoria</label>
                    <select id="aiCategory">
                        <option>Sport</option>
                        <option>Zdrowie</option>
                        <option>Dom</option>
                        <option>Praca</option>
                        <option>Hobby</option>
                        <option>Inne</option>
                    </select>
                </div>
                <button class="btn-add-category" onclick="addCategory('aiCategory')">
                    <span style="font-size:16px;line-height:1">+</span> Nowa kategoria
                </button>
            </div>
            
            <div class="actions-row">
                <button class="btn btn-primary" onclick="generateNote()">Generuj notatke</button>
                <button class="btn btn-primary" onclick="addNoteAi()">Dodaj notatkę</button>
                <button class="btn btn-ghost" onclick="cancelAi()">Anuluj</button>
            </div>
        </div>

        <div class="transparent-effect">
    
            <div class="notes-header">
                <h2>Zapisane notatki</h2>
                <div class="notes-header-right">
                    <span class="notes-count" id="notesCount">0 notatek</span>
                    <div class="find-note">
                        <button onclick="showInput()" class="find"><i class="fa-solid fa-magnifying-glass" style="color: rgb(255, 255, 255);"></i></button>
                        <input type="text" placeholder="Wpisz tytuł notatki" class="find-input" onkeydown="search(this)">
                    </div>
                    <div class="sort-buttons">
                        <button class="sort-btn active" id="sortAZ" onclick="setSort('az')" title="Sortuj A–Z">A→Z</button>
                        <button class="sort-btn" id="sortZA" onclick="setSort('za')" title="Sortuj Z–A">Z→A</button>
                    </div>
                </div>
            </div>
    
            <div id="emptyState" class="empty-state" style="display:none">
                <div class="empty-icon">📋</div>
                <p>Nie masz jeszcze żadnych notatek</p>
            </div>
    
            <ul id="noteList"></ul>
    
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
